<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Tip Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: rgb(173, 223, 173);
            font-family: 'Source Sans 3', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: rgb(1, 94, 1);
            color: whitesmoke;
            padding-left: 15px;
            padding-right: 15px;
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .header h1 { font-size: 20px; font-weight: normal; }

        .header a {
            color: whitesmoke;
            text-decoration: none;
            font-size: 14px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 620px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(1,94,1,0.15);
            text-align: center;
        }

        .golf-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: rgb(1, 94, 1);
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .category-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }

        .cat-btn {
            background: none;
            border: 1.5px solid rgb(1, 94, 1);
            color: rgb(1, 94, 1);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Source Sans 3', sans-serif;
            transition: all 0.2s;
        }

        .cat-btn:hover, .cat-btn.active {
            background: rgb(1, 94, 1);
            color: white;
        }

        .tip-box {
            background: rgb(240, 250, 240);
            border-left: 4px solid rgb(1, 94, 1);
            border-radius: 8px;
            padding: 24px 20px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            text-align: left;
        }

        .tip-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 17px;
            color: #2a2a2a;
            line-height: 1.7;
        }

        .tip-text.placeholder {
            color: #aaa;
            font-size: 15px;
            text-align: center;
            width: 100%;
            font-style: normal;
            font-family: 'Source Sans 3', sans-serif;
        }

        .generate-btn {
            background-color: rgb(1, 94, 1);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px 36px;
            font-size: 16px;
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        .generate-btn:hover { background-color: rgb(2, 120, 2); }
        .generate-btn:active { transform: scale(0.98); }
        .generate-btn:disabled { background-color: #aaa; cursor: not-allowed; }

        .loading-dots span {
            display: inline-block;
            animation: bounce 1s infinite;
            margin: 0 2px;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .back-link a {
            color: rgb(1, 94, 1);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Golf Tip Generator</h1>
        <a href="fromscratch.html">← Back to Golf Page</a>
    </div>

    <div class="main">
        <div class="card">
            <div class="golf-icon">⛳</div>
            <h2>Golf Tip of the Moment</h2>
            <p class="subtitle">Pick a category and get an AI-powered tip to improve your game.</p>

            <div class="category-row">
                <button class="cat-btn active" onclick="selectCategory(this, 'general golf')">General</button>
                <button class="cat-btn" onclick="selectCategory(this, 'driving and tee shots')">Driving</button>
                <button class="cat-btn" onclick="selectCategory(this, 'iron play and approach shots')">Irons</button>
                <button class="cat-btn" onclick="selectCategory(this, 'putting')">Putting</button>
                <button class="cat-btn" onclick="selectCategory(this, 'chipping and short game')">Short Game</button>
                <button class="cat-btn" onclick="selectCategory(this, 'golf course management and strategy')">Strategy</button>
            </div>

            <div class="tip-box">
                <p class="tip-text placeholder" id="tip-display">Hit "Generate Tip" to get started!</p>
            </div>

            <button class="generate-btn" id="gen-btn" onclick="generateTip()">Generate Tip</button>
        </div>

        <div class="back-link">
            <a href="scratch.html">← Return to Golf Page</a>
        </div>
    </div>

    <script>
        let selectedCategory = 'general golf';

        function selectCategory(btn, category) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedCategory = category;
        }

        async function generateTip() {
            const btn = document.getElementById('gen-btn');
            const display = document.getElementById('tip-display');

            btn.disabled = true;
            display.className = 'tip-text placeholder';
            display.innerHTML = '<span class="loading-dots"><span>●</span><span>●</span><span>●</span></span>';

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        messages: [{
                            role: 'user',
                            content: `Give me one practical, specific golf tip about ${selectedCategory}. 
                            Make it 2-3 sentences, conversational, and genuinely useful for an average golfer. 
                            Do not include any intro like "Here's a tip:" — just give the tip directly.`
                        }]
                    })
                });

                const data = await response.json();
                const tip = data.content[0].text;

                display.className = 'tip-text';
                display.textContent = tip;

            } catch (err) {
                display.className = 'tip-text placeholder';
                display.textContent = 'Something went wrong. Try again!';
            }

            btn.disabled = false;
        }
    </script>

</body>
</html>
